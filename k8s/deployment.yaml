apiVersion: v1
kind: Namespace
metadata:
  name: workout

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workout-data
  namespace: workout
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workout
  namespace: workout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workout
  template:
    metadata:
      labels:
        app: workout
    spec:
      containers:
        - name: workout
          image: ghcr.io/pablo-george/workout.pablogeorge.org:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "file:/app/data/workoutapp.db"
            - name: PORT
              value: "8080"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: workout-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workout-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: workout-secrets
                  key: GOOGLE_CALLBACK_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: workout-secrets
                  key: SESSION_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workout-secrets
                  key: GEMINI_API_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: workout-data

---
apiVersion: v1
kind: Service
metadata:
  name: workout
  namespace: workout
spec:
  selector:
    app: workout
  ports:
    - port: 8080
      targetPort: 8080
