apiVersion: v1
kind: Namespace
metadata:
  name: workout-app

---
# Persistent storage for SQLite DB and uploaded images.
# Uses k3s's default local-path storage class.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workout-app-data
  namespace: workout-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

---
# GHCR image pull secret — only needed if your package is private.
# Create it once with:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --namespace workout-app \
#     --docker-server=ghcr.io \
#     --docker-username=<your-github-username> \
#     --docker-password=<github-pat-with-read:packages>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workout-app
  namespace: workout-app
spec:
  replicas: 1  # SQLite is single-writer — do not increase
  selector:
    matchLabels:
      app: workout-app
  template:
    metadata:
      labels:
        app: workout-app
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret  # remove if package is public
      containers:
        - name: workout-app
          image: ghcr.io/pablo-george/workout-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "file:/app/data/workoutapp.db"
            - name: NODE_ENV
              value: "production"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: GOOGLE_CALLBACK_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: SESSION_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: GEMINI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: workout-app-secrets
                  key: AWS_REGION
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: workout-app-data

---
apiVersion: v1
kind: Service
metadata:
  name: workout-app
  namespace: workout-app
spec:
  selector:
    app: workout-app
  ports:
    - port: 8080
      targetPort: 8080

---
# Traefik ingress (k3s default).
# Replace workout.yourdomain.com with your actual hostname.
# If you have cert-manager installed, uncomment the tls section.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workout-app
  namespace: workout-app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: workout.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workout-app
                port:
                  number: 8080
  # tls:
  #   - hosts:
  #       - workout.yourdomain.com
  #     secretName: workout-app-tls
